        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

<body class="bg-surface text-on-surface font-body antialiased min-h-screen flex flex-col">
<!-- TopNavBar -->
<nav class="bg-surface-container-lowest/80 backdrop-blur-xl docked full-width top-0 sticky z-50 no-border">
<div class="flex justify-between items-center px-12 py-6 w-full max-w-screen-2xl mx-auto">
<div class="text-2xl font-headline italic text-primary tracking-tight">
                Alexandria
            </div>
<div class="hidden md:flex gap-8 items-center">
<a class="text-on-surface-variant font-body hover:text-primary transition-colors duration-300" href="#">Dashboard</a>
<a class="text-primary font-body border-b-2 border-tertiary font-medium" href="#">Logs</a>
<a class="text-on-surface-variant font-body hover:text-primary transition-colors duration-300" href="#">Planning</a>
<a class="text-on-surface-variant font-body hover:text-primary transition-colors duration-300" href="#">Archive</a>
</div>
<div class="flex items-center gap-6 text-primary">
<button aria-label="Search" class="hover:bg-surface-variant p-2 rounded-full transition-colors duration-300">
<span class="material-symbols-outlined" data-icon="search">search</span>
</button>
<button aria-label="Notifications" class="hover:bg-surface-variant p-2 rounded-full transition-colors duration-300">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
<button aria-label="Account" class="hover:bg-surface-variant p-2 rounded-full transition-colors duration-300">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
</div>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center p-8 bg-surface">
<div class="max-w-2xl w-full flex flex-col items-center text-center space-y-8">
<!-- Archival Icon / Illustration Area -->
<div class="relative w-48 h-48 flex items-center justify-center bg-surface-container-low rounded-full">
<!-- Subtle inner shadow to give depth to the circular canvas -->
<div class="absolute inset-0 rounded-full shadow-[inset_0_4px_24px_rgba(25,27,34,0.04)]"></div>
<span class="material-symbols-outlined text-8xl text-outline-variant" data-icon="history_edu" style="font-variation-settings: 'wght' 200;">
                    history_edu
                </span>
<!-- Decorative archival accent -->
<div class="absolute -bottom-4 right-4 bg-surface-container-lowest p-3 rounded-full border border-outline-variant/15 shadow-[0_8px_32px_rgba(25,27,34,0.06)]">
<span class="material-symbols-outlined text-tertiary" data-icon="search_off">search_off</span>
</div>
</div>
<!-- Typography -->
<div class="space-y-4 max-w-md">
<h1 class="font-headline text-display-sm text-on-surface">No Records Found</h1>
<p class="font-body text-body-lg text-on-surface-variant leading-relaxed">
                    The archives are currently empty for this period. Awaiting the documentation of a new journey.
                </p>
</div>
<!-- Action Area -->
<div class="pt-8">
<button class="bg-gradient-to-r from-primary to-primary-container text-on-primary font-body text-label-lg px-8 py-4 rounded-md shadow-[0_4px_12px_rgba(0,54,134,0.15)] hover:shadow-[0_6px_16px_rgba(0,54,134,0.2)] transition-shadow duration-300 flex items-center gap-3">
<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
                    Start New Journey
                </button>
</div>
